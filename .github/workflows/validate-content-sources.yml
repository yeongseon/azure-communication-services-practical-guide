name: Validate Content Sources

# STRICT mode (post-migration): P3-ACS data migration is complete
# (Waves 0-6 shipped; all 56 mermaid-bearing pages use the canonical
# content_sources.diagrams mapping shape).
#
# The content_sources validator is now BLOCKING on PRs. New pages with
# non-canonical shapes will fail this check.
#
# The MSLearn URL validator remains warn-only to avoid rate-limit-
# induced false failures (matches the ACA sibling repo pattern).
#
# Reference implementation (strict mode source-of-truth):
#   azure-container-apps-practical-guide/.github/workflows/validate-content-sources.yml
#
# Migration plan:
#   https://github.com/yeongseon/azure-architecture-practical-guide/blob/main/.sisyphus/plans/p3-acs-frontmatter-decomposition.md

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - '.github/workflows/**'

jobs:
  validate-content-sources:
    name: Validate Content Source Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run doctests for scripts/lib/content_scope.py
        run: |
          python -m doctest scripts/lib/content_scope.py -v

      - name: Audit content_sources frontmatter (strict)
        run: |
          python scripts/validate_content_sources.py

  validate-cli-explanations:
    name: Validate Azure CLI Explanation Tables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doctests for scripts/validate_cli_explanations.py
        run: |
          python -m doctest scripts/validate_cli_explanations.py -v

      - name: Enforce explanation tables after Azure CLI code fences
        run: |
          if ! python scripts/validate_cli_explanations.py; then
            echo "::error::Azure CLI explanation table validation failed. Add a '| Command | Purpose |' table immediately after each bash az code fence."
            exit 1
          fi

  validate-mslearn-urls:
    name: Validate MSLearn URLs (warn-only)
    runs-on: ubuntu-latest
    # Only run on push to main to avoid rate limiting on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Validate Microsoft Learn URLs
        run: |
          python scripts/validate_mslearn_urls.py --verbose
        continue-on-error: true  # Don't fail build on URL issues, just report.
