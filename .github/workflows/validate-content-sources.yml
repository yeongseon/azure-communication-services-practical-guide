name: Validate Content Sources

# ACS P3-ACS Wave 0 bootstrap workflow.
#
# NON-BLOCKING / WARN-ONLY mode: this workflow deliberately runs the
# validators with `continue-on-error: true` because ACS is mid-migration
# (121 of 136 content_sources-bearing files use non-canonical legacy
# shapes as of the P2-1 audit). The validators are here to measure
# migration progress, not to block PRs. Wave 7 will flip this to strict.
#
# Reference implementation (strict mode):
#   azure-container-apps-practical-guide/.github/workflows/validate-content-sources.yml
#
# Migration plan:
#   https://github.com/yeongseon/azure-architecture-practical-guide/blob/main/.sisyphus/plans/p3-acs-frontmatter-decomposition.md

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - '.github/workflows/**'

jobs:
  validate-content-sources:
    name: Validate Content Source Metadata (warn-only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run doctests for scripts/lib/content_scope.py
        run: |
          python -m doctest scripts/lib/content_scope.py -v

      - name: Audit content_sources frontmatter (warn-only during ACS migration)
        run: |
          python scripts/validate_content_sources.py
        continue-on-error: true  # Non-blocking during P3-ACS wave migration.
                                 # Flip to blocking after Wave 7 (see plan §6.3).

  validate-mslearn-urls:
    name: Validate MSLearn URLs (warn-only)
    runs-on: ubuntu-latest
    # Only run on push to main to avoid rate limiting on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Validate Microsoft Learn URLs
        run: |
          python scripts/validate_mslearn_urls.py --verbose
        continue-on-error: true  # Don't fail build on URL issues, just report.
