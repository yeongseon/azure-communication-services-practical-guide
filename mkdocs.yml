site_name: Azure Communication Services Practical Guide
site_url: https://yeongseon.github.io/azure-communication-services-practical-guide/
site_description: Comprehensive guide for Azure Communication Services — SMS, Voice, Email, Chat, Video Calling, and Teams Interop
site_author: yeongseon

repo_name: yeongseon/azure-communication-services-practical-guide
repo_url: https://github.com/yeongseon/azure-communication-services-practical-guide

theme:
  name: material
  language: en
  favicon: assets/images/favicon.svg
  logo: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs

extra_css:
  - stylesheets/extra.css
  - stylesheets/document-graph.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-zoom.js
  - https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js
  - javascripts/document-graph.js
  - javascripts/troubleshooting-map.js

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-communication-services-practical-guide

